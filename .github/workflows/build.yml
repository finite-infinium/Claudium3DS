name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 3DS packages
        run: |
          dkp-pacman --noconfirm -Sy
          dkp-pacman --noconfirm -S 3ds-dev 3ds-curl 3ds-mbedtls

      - name: Build .3dsx and .smdh
        run: make

      - name: Install bannertool
        run: |
          curl -sLo /tmp/bannertool.zip \
            https://github.com/diasurgical/bannertool/releases/download/1.2.0/bannertool.zip
          unzip /tmp/bannertool.zip linux-x86_64/bannertool -d /tmp/bannertool-extract
          install -m 755 /tmp/bannertool-extract/linux-x86_64/bannertool /usr/local/bin/bannertool

      - name: Install makerom
        run: |
          curl -sLo /tmp/makerom.zip \
            https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18.4/makerom-v0.18.4-ubuntu_x86_64.zip
          unzip /tmp/makerom.zip -d /tmp/makerom-extract
          install -m 755 /tmp/makerom-extract/makerom /usr/local/bin/makerom
        continue-on-error: true

      - name: Build .cia
        run: make cia

      - name: Upload build artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: Claudium3DS
          path: |
            Claudium3DS.3dsx
            Claudium3DS.smdh
            Claudium3DS.cia

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            Claudium3DS.3dsx
            Claudium3DS.smdh
            Claudium3DS.cia
